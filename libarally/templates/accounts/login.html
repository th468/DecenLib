{% extends "accounts/base.html" %}
{% block content %}
<h1>ログイン画面</h1>
<form method="POST">
    {% csrf_token %}
    {{ login_form.as_p }}

    {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
    
    <input type="submit" value="ログイン">
</form>
{% endblock content %}
